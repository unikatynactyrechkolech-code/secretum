<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0505"/>
      <stop offset="55%" stop-color="#160707"/>
      <stop offset="100%" stop-color="#050202"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c81d1d" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c81d1d" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a0d0d"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- moon glow -->
  <circle cx="1250" cy="150" r="220" fill="#c81d1d" opacity="0.08"/>
  <circle cx="1250" cy="150" r="55" fill="#f2e6d8" opacity="0.85"/>

  <!-- distant clouds -->
  <ellipse cx="300" cy="120" rx="260" ry="40" fill="#1a0a0a" opacity="0.6"/>
  <ellipse cx="900" cy="90" rx="320" ry="50" fill="#1a0a0a" opacity="0.5"/>
  <ellipse cx="1300" cy="220" rx="300" ry="45" fill="#1a0a0a" opacity="0.55"/>

  <!-- city skyline silhouette -->
  <g fill="#0c0404">
    <rect x="0" y="520" width="60" height="220"/>
    <rect x="70" y="480" width="40" height="260"/>
    <rect x="120" y="560" width="70" height="180"/>
    <polygon points="210,560 245,560 245,460 227,420 210,460"/>
    <rect x="260" y="500" width="50" height="240"/>
    <rect x="320" y="540" width="90" height="200"/>
    <rect x="430" y="470" width="45" height="270"/>
    <polygon points="490,540 560,540 560,380 555,340 545,320 535,340 530,380 525,540"/>
    <rect x="580" y="500" width="55" height="240"/>
    <rect x="650" y="560" width="100" height="180"/>
    <rect x="760" y="490" width="48" height="250"/>
    <rect x="820" y="520" width="70" height="220"/>
    <polygon points="905,520 940,520 940,430 922,400 905,430"/>
    <rect x="960" y="470" width="55" height="270"/>
    <rect x="1030" y="550" width="110" height="190"/>
    <rect x="1160" y="500" width="50" height="240"/>
    <rect x="1230" y="560" width="80" height="180"/>
    <rect x="1330" y="480" width="45" height="260"/>
    <polygon points="1390,480 1420,480 1420,410 1405,380 1390,410"/>
    <rect x="1440" y="530" width="65" height="210"/>
    <rect x="1520" y="500" width="80" height="240"/>
  </g>

  <!-- windows glow -->
  <g fill="#d99a3a" opacity="0.55">
    <rect x="15" y="560" width="6" height="8"/>
    <rect x="30" y="600" width="6" height="8"/>
    <rect x="85" y="520" width="6" height="8"/>
    <rect x="335" y="580" width="6" height="8"/>
    <rect x="360" y="620" width="6" height="8"/>
    <rect x="665" y="600" width="6" height="8"/>
    <rect x="700" y="650" width="6" height="8"/>
    <rect x="1045" y="590" width="6" height="8"/>
    <rect x="1080" y="630" width="6" height="8"/>
    <rect x="1245" y="600" width="6" height="8"/>
  </g>

  <!-- river -->
  <rect x="0" y="740" width="1600" height="160" fill="url(#river)"/>
  <g stroke="#c81d1d" stroke-opacity="0.18" stroke-width="3">
    <line x1="0" y1="760" x2="1600" y2="760"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="0" y1="840" x2="1600" y2="840"/>
  </g>

  <!-- foreground silhouette: photographer -->
  <g fill="#020101">
    <ellipse cx="1230" cy="900" rx="260" ry="120"/>
    <path d="M1080 900 C1085 760 1110 690 1160 660 C1180 648 1195 648 1205 655 C1215 640 1235 630 1255 638 C1270 615 1300 610 1320 630 C1345 622 1372 638 1378 665 C1400 675 1408 705 1400 730 L1400 900 Z"/>
    <!-- camera -->
    <rect x="1258" y="668" width="70" height="34" rx="6"/>
    <rect x="1320" y="672" width="34" height="24" rx="4"/>
    <circle cx="1278" cy="684" r="12"/>
  </g>
</svg>
